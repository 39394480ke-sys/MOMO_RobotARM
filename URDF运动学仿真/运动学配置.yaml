robot:
  name: soarmmoce
  urdf_path: urdf/soarmoce_urdf.urdf
  target_frame: wrist_roll

  sdk_joint_names:
    - shoulder_pan
    - shoulder_lift
    - elbow_flex
    - wrist_flex
    - wrist_roll

  joint_name_aliases:
    shoulder_pan: shoulder
    shoulder_lift: shoulder_lift
    elbow_flex: elbow
    wrist_flex: wrist
    wrist_roll: wrist_roll

  joint_scales:
    shoulder_pan: 1.0
    shoulder_lift: -5.3
    elbow_flex: 5.6
    wrist_flex: -1.0
    wrist_roll: 1.0

  model_offsets_deg:
    shoulder_pan: 0.0
    shoulder_lift: 0.0
    elbow_flex: 0.0
    wrist_flex: 0.0
    wrist_roll: 0.0

kinematics:
  backend: pybullet
  ik_max_iters: 200
  ik_target_tol_m: 0.001
  ik_orientation_tol_rad: 0.02
  max_ee_pos_err_m: 0.03
  seed_policy: current

control:
  default_move_duration: 1.0
  cartesian_update_hz: 25.0
  linear_step_m: 0.01
  joint_step_deg: 5.0

viewer:
  use_gui: true
  fixed_base: true
