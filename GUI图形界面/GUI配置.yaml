app:
  title: 我的机械臂 GUI 控制台
  language: zh
  default_mode: dry_run
  refresh_interval_ms: 200
  log_path: 运行日志/gui_runtime.log

controller:
  sim_config_path: ../仿真控制系统/配置_config.yaml
  real_config_path: ../真实舵机控制/真实配置.yaml
  action_config_path: ../动作录制与回放增强/动作配置.yaml
  kinematics_config_path: ../URDF运动学仿真/运动学配置.yaml

safety:
  real_mode_requires_confirm: false
  default_dry_run: true
  max_gui_step_deg: 5.0
  max_real_step_deg: 3.0

ui:
  show_3d_view: true
  show_logs: true
  show_tcp: true
  compact_mode: false
