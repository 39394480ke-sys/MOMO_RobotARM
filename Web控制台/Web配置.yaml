server:
  host: 127.0.0.1
  port: 8010
  reload: false
  cors_enabled: true
  allowed_origins:
    - http://127.0.0.1:8010
    - http://localhost:8010
    - http://127.0.0.1:8000
    - http://localhost:8000

app:
  title: 我的机械臂 Web 控制台
  default_mode: dry_run
  state_poll_interval_ms: 500
  log_path: runtime/logs/web_api.log
  session_state_path: runtime/state/session_state.json

controller:
  sim_config_path: ../仿真控制系统/配置.yaml
  real_config_path: ../真实舵机控制/真实配置.yaml
  kinematics_config_path: ../URDF运动学仿真/运动学配置.yaml
  action_config_path: ../动作录制与回放增强/动作配置.yaml

safety:
  default_dry_run: true
  real_mode_requires_confirm: false
  real_confirm_text: 我确认机械臂周围安全
  max_manual_step_deg: 5.0
  max_real_step_deg: 3.0

motion:
  default_speed_percent: 50
  default_joint_step_deg: 2.0
  default_cartesian_step_mm: 5.0
  default_cartesian_angle_deg: 5.0
  quick_step_duration_s: 0.8
  quick_step_frames: 12
  continuous_update_hz: 20.0
  continuous_target_horizon_s: 0.25
  playback_update_hz: 20.0
  jog_direction_overrides:
    j10: 1
    j11: 1
    j12: 1
    j13: 1
    j14: 1
    j15: 1

follow:
  latest_url: http://127.0.0.1:8000/latest
  robot_api_base: http://127.0.0.1:8010
  poll_interval_sec: 0.05
  move_duration_sec: 0.25
  speed_percent: 60
  command_mode: stream
  pan_joint: j11
  tilt_joint: j13
  pan_sign: 1.0
  tilt_sign: -1.0
  pan_gain_deg_per_norm: 4.8
  tilt_gain_deg_per_norm: 4.8
  pan_dead_zone_norm: 0.03
  tilt_dead_zone_norm: 0.035
  pan_resume_zone_norm: 0.05
  tilt_resume_zone_norm: 0.055
  min_pan_step_deg: 0.5
  min_tilt_step_deg: 0.5
  pan_min_step_zone_norm: 0.12
  tilt_min_step_zone_norm: 0.12
  max_pan_step_deg: 3.0
  max_tilt_step_deg: 3.0
  rail_cinematic:
    enabled: false
    joint: j10
    start_mm: -140
    end_mm: 140
    speed_mm_s: 5.0
    bounce: false
  real_mode_requires_confirm: false
  dry_run_default: true
