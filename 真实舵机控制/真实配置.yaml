{
  "项目名称": "我的MomoAgent真实舵机控制系统",
  "说明": "阶段四配置。默认 dry_run 为 true，不会真实写入舵机。",
  "transport": {
    "type": "serial",
    "port": "/dev/tty.usbmodem5B141127021",
    "timeout": 2.0,
    "robot_id": "soarmmoce",
    "dry_run": true,
    "gripper_available": true,
    "arm_p_coefficient": 16,
    "arm_d_coefficient": 8,
    "update_hz": 25.0
  },
  "robot": {
    "dof": 5,
    "end_link": "wrist_roll",
    "joint_order": [
      "shoulder_pan",
      "shoulder_lift",
      "elbow_flex",
      "wrist_flex",
      "wrist_roll"
    ],
    "joint_name_aliases": {
      "shoulder_pan": "shoulder",
      "shoulder_lift": "shoulder_lift",
      "elbow_flex": "elbow",
      "wrist_flex": "wrist",
      "wrist_roll": "wrist_roll"
    },
    "joints": [
      {
        "key": "shoulder_pan",
        "key_注释": "shoulder_pan = J1_底座旋转",
        "中文名": "底座旋转",
        "编号": 1,
        "关节编号": "J1",
        "舵机ID": 1,
        "模式": "单圈",
        "最小角度": -90,
        "最大角度": 90,
        "默认角度": 0
      },
      {
        "key": "shoulder_lift",
        "key_注释": "shoulder_lift = J2_肩部抬升",
        "中文名": "肩部抬升",
        "编号": 2,
        "关节编号": "J2",
        "舵机ID": 2,
        "模式": "多圈",
        "最小角度": -45,
        "最大角度": 90,
        "默认角度": 0
      },
      {
        "key": "elbow_flex",
        "key_注释": "elbow_flex = J3_肘部弯曲",
        "中文名": "肘部弯曲",
        "编号": 3,
        "关节编号": "J3",
        "舵机ID": 3,
        "模式": "多圈",
        "最小角度": -90,
        "最大角度": 90,
        "默认角度": 0
      },
      {
        "key": "wrist_flex",
        "key_注释": "wrist_flex = J4_腕部俯仰",
        "中文名": "腕部俯仰",
        "编号": 4,
        "关节编号": "J4",
        "舵机ID": 4,
        "模式": "单圈",
        "最小角度": -90,
        "最大角度": 90,
        "默认角度": 0
      },
      {
        "key": "wrist_roll",
        "key_注释": "wrist_roll = J5_腕部旋转",
        "中文名": "腕部旋转",
        "编号": 5,
        "关节编号": "J5",
        "舵机ID": 5,
        "模式": "多圈",
        "最小角度": -180,
        "最大角度": 180,
        "默认角度": 0
      }
    ],
    "joint_scales": {
      "shoulder_pan": 1.0,
      "shoulder_lift": -5.3,
      "elbow_flex": 5.6,
      "wrist_flex": -1.0,
      "wrist_roll": 1.0
    },
    "关节减速比_joint_scales": {
      "shoulder_pan": 1.0,
      "shoulder_lift": -5.3,
      "elbow_flex": 5.6,
      "wrist_flex": -1.0,
      "wrist_roll": 1.0
    },
    "multi_turn_joints": [
      "shoulder_lift",
      "elbow_flex",
      "wrist_roll"
    ],
    "single_turn_joints": [
      "shoulder_pan",
      "wrist_flex"
    ]
  },
  "control": {
    "hz": 25.0,
    "timeout": 2.0,
    "linear_step_m": 0.01,
    "joint_step_deg": 5.0,
    "move_duration": 1.0,
    "cartesian_settle_time_s": 0.15,
    "wait_timeout": 2.5,
    "settle_tolerance_raw": 16
  },
  "运动控制参数_control": {
    "update_hz": 25.0,
    "joint_step_deg": 5.0,
    "move_duration": 1.0,
    "wait_timeout": 2.5,
    "settle_tolerance_raw": 16
  },
  "protocol": {
    "unit": "deg",
    "raw_counts_per_rev": 4096,
    "raw_degrees_per_rev": 360.0,
    "max_retries": 1,
    "use_seq": false,
    "position_mode_value": 0,
    "multi_turn_phase_value": 28,
    "multi_turn_disabled_limit_raw": 0,
    "multi_turn_absolute_raw_limit": 30719
  },
  "硬件通信协议_protocol": {
    "raw_counts_per_rev": 4096,
    "raw_degrees_per_rev": 360.0,
    "multi_turn_absolute_raw_limit": 30719,
    "position_mode_value": 0,
    "multi_turn_phase_value": 28
  },
  "calibration": {
    "path": "标定文件.json"
  },
  "标定修正文件_calibration": {
    "path": "标定文件.json"
  },
  "files": {
    "runtime_state": "硬件状态记录_runtime_state.json",
    "stage3_pose_library": "../仿真控制系统/姿态管理/姿态库.json",
    "stage3_action_dir": "../仿真控制系统/姿态管理/动作库"
  },
  "状态实时保存_files": {
    "runtime_state": "硬件状态记录_runtime_state.json"
  },
  "gripper": {
    "key": "gripper",
    "key_注释": "gripper = 夹爪_舵机ID6",
    "舵机ID": 6,
    "最小开合": 0,
    "最大开合": 100,
    "默认开合": 50,
    "张开值": 100,
    "闭合值": 0
  }
}
