server:
  host: 127.0.0.1
  port: 8010
  reload: false
  cors_enabled: true
  allowed_origins:
    - http://127.0.0.1:8010
    - http://localhost:8010

app:
  title: 我的 MomoAgent Web 控制台
  default_mode: dry_run
  state_poll_interval_ms: 500
  log_path: runtime/logs/web_api.log
  session_state_path: runtime/state/session_state.json

controller:
  sim_config_path: ../仿真控制系统/配置.yaml
  real_config_path: ../真实舵机控制/真实配置.yaml
  kinematics_config_path: ../URDF运动学仿真/运动学配置.yaml
  action_config_path: ../动作录制与回放增强/动作配置.yaml

safety:
  default_dry_run: true
  real_mode_requires_confirm: true
  real_confirm_text: 我确认机械臂周围安全
  max_manual_step_deg: 5.0
  max_real_step_deg: 2.0

motion:
  default_speed_percent: 50
  default_joint_step_deg: 2.0
  default_cartesian_step_mm: 5.0
  default_cartesian_angle_deg: 5.0

follow:
  latest_url: http://127.0.0.1:8000/latest
  robot_api_base: http://127.0.0.1:8010
  poll_interval_sec: 0.08
  move_duration_sec: 0.20
  command_mode: stream
  pan_joint: shoulder_pan
  tilt_joint: elbow_flex
  pan_sign: 1.0
  tilt_sign: -1.0
  pan_gain_deg_per_norm: 4.8
  tilt_gain_deg_per_norm: 6.0
  pan_dead_zone_norm: 0.02
  tilt_dead_zone_norm: 0.025
  pan_resume_zone_norm: 0.03
  tilt_resume_zone_norm: 0.035
  min_pan_step_deg: 0.35
  min_tilt_step_deg: 0.7
  pan_min_step_zone_norm: 0.08
  tilt_min_step_zone_norm: 0.12
  max_pan_step_deg: 1.6
  max_tilt_step_deg: 1.8
  real_mode_requires_confirm: true
  dry_run_default: true
