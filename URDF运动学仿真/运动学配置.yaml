robot:
  name: soarmmoce_with_linear_rail
  urdf_path: urdf/soarmoce_urdf.urdf
  target_frame: Link_6

  sdk_joint_names:
    - j10
    - j11
    - j12
    - j13
    - j14
    - j15

  joint_name_aliases:
    j10: J10
    j11: J11
    j12: J12
    j13: J13
    j14: J14
    j15: J15
    shoulder_pan: J11
    shoulder_lift: J12
    elbow_flex: J13
    wrist_flex: J14
    wrist_roll: J15

  joint_user_units:
    j10: mm
    j11: deg
    j12: deg
    j13: deg
    j14: deg
    j15: deg

  joint_scales:
    j10: 1.0
    j11: 5.0
    j12: -5.3
    j13: 5.6
    j14: -1.0
    j15: 1.0

  model_offsets_deg:
    j10: 0.0
    j11: 0.0
    j12: 0.0
    j13: 0.0
    j14: 0.0
    j15: 0.0

kinematics:
  backend: pybullet
  ik_max_iters: 200
  ik_target_tol_m: 0.001
  ik_orientation_tol_rad: 0.02
  max_ee_pos_err_m: 0.03
  seed_policy: current

control:
  default_move_duration: 1.0
  cartesian_update_hz: 25.0
  linear_step_m: 0.01
  joint_step_deg: 5.0

viewer:
  use_gui: true
  fixed_base: true
